name: Build o11y-metrics extra images

on:
  push:
    branches: [staging]
    paths:
      - 'o11y-metrics/docker/snowem/**'
      - 'o11y-metrics/docker/elastic-inference-proxy/**'
      - '.github/workflows/build-o11y-extras.yml'
  workflow_dispatch:
    inputs:
      image:
        description: 'Which image to build'
        default: 'all'
        type: choice
        options:
          - all
          - snowem
          - elastic-inference-proxy

jobs:
  snowem:
    name: Build snowem
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.image == 'all' || github.event.inputs.image == 'snowem') ||
      github.event_name == 'push' && contains(github.event.head_commit.modified, 'o11y-metrics/docker/snowem/')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: o11y-metrics/docker/snowem
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/o11y-metrics-snowem:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/o11y-metrics-snowem:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  elastic-inference-proxy:
    name: Build elastic-inference-proxy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.image == 'all' || github.event.inputs.image == 'elastic-inference-proxy') ||
      github.event_name == 'push' && contains(github.event.head_commit.modified, 'o11y-metrics/docker/elastic-inference-proxy/')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: o11y-metrics/docker/elastic-inference-proxy
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/elastic-inference-proxy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/elastic-inference-proxy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
